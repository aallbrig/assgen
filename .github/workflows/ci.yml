name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Run tests
        run: pytest -v --tb=short -q -m "not integration"

  hf-integration:
    name: HuggingFace Integration Tests
    runs-on: ubuntu-latest
    # Only run on pushes to main (not every PR) to avoid hammering HF API
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run HuggingFace integration tests
        run: pytest -v --tb=short -m integration tests/test_hf_integration.py

  docker-build:
    name: Docker Build (smoke test)
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.server
          push: false
          build-args: VERSION=ci
          tags: assgen-server:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build client image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.client
          push: false
          build-args: VERSION=ci
          tags: assgen-client:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
