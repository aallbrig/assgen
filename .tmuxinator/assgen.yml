# .tmuxinator/assgen.yml
# Start:  task dev         (kills existing session, then launches this)
# Attach: task dev-attach
# Logs:   task dev-logs | dev-logs-server | dev-logs-shell | dev-logs-docs
#
# Window / pane index map (stable — dev-logs-* tasks depend on this order):
#
#   window 0 — dev
#     pane 0  serve   assgen server  http://localhost:8432  (focus on attach)
#     pane 1  shell   assgen CLI     ad-hoc commands, task runs, curl tests
#     pane 2  docs    mkdocs         http://localhost:8000
#
#   window 1 — obs
#     pane 0  obs     LGTM stack     grafana http://localhost:3030
#                                    prometheus http://localhost:9092

name: assgen
root: <%= ENV['HOME'] %>/src/assgen

windows:
  - dev:
      layout: main-horizontal
      panes:
        - commands:
            - task serve
          focus: true
        - ""
        - task docs

  - obs:
      layout: even-horizontal
      panes:
        - task obs-start
        - ""
