# .tmuxinator/assgen.yml
# Start:  task dev         (kills existing session, then launches this)
# Attach: task dev-attach
# Logs:   task dev-logs | dev-logs-server | dev-logs-shell | dev-logs-docs
#
# Pane index map (stable — dev-logs-* tasks depend on this order):
#   0  serve   assgen server  http://localhost:8432  (SwaggerUI at /docs, ReDoc at /redoc)
#   1  shell   assgen CLI     ad-hoc commands, task runs, curl tests
#   2  docs    mkdocs         http://localhost:8000

name: assgen
root: <%= ENV['HOME'] %>/src/assgen

windows:
  - dev:
      layout: main-horizontal
      panes:
        - task serve
        - ""
        - task docs
