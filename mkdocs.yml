site_name: assgen
site_description: AI-driven game asset generation pipeline — CLI + server for 3D game development
site_url: https://aallbrig.github.io/assgen/
repo_url: https://github.com/aallbrig/assgen
repo_name: aallbrig/assgen
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - toc.integrate
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.action.edit
  icon:
    repo: fontawesome/brands/github
    logo: material/gamepad-variant-outline

extra:
  version:
    provider: mike
    default: latest
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/aallbrig/assgen

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - mkdocs_typer
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - def_list
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            docstring_options:
              ignore_init_summary: false
            show_root_heading: true
            show_root_full_path: false
            show_source: true
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true
            members_order: source
            filters: ["!^_"]   # hide private members by default
  - mike:
      alias_type: symlink
      canonical_version: latest

nav:
  - Home: index.md
  - Getting Started:
    - Installation & Upgrade: install.md
    - Quick Start: quickstart.md
  - CLI Reference: cli-reference.md
  - Configuration:
    - Overview: configuration.md
    - Model Validation: model-validation.md
  - API Reference: api-reference.md
  - Guides:
    - Server Setup (Remote GPU): server-setup.md
    - Adding Inference Handlers: contributing.md
