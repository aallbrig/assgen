# SonarCloud — free for open source projects (sonarcloud.io)
# Setup: import the GitHub repo at sonarcloud.io, then add SONAR_TOKEN to GitHub secrets.

sonar.projectKey=aallbrig_assgen
sonar.organization=aallbrig

sonar.projectName=assgen
sonar.projectVersion=0.1

sonar.sources=src/
sonar.tests=tests/
sonar.python.version=3.11

# Coverage report generated by task test-coverage (pytest --cov ... --cov-report=xml)
sonar.python.coverage.reportPaths=coverage.xml

sonar.exclusions=**/__pycache__/**,**/*.pyc,**/_version.py,site/**,dist/**,build/**
sonar.test.exclusions=tests/**
sonar.coverage.exclusions=tests/**,scripts/**
